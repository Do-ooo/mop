name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
          - os: darwin
            arch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build
        run: |
          BINARY="mop-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi
          VERSION="${GITHUB_REF_NAME}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags "-X mop/update.Version=$VERSION" -o "$BINARY" .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mop-${{ matrix.os }}-${{ matrix.arch }}
          path: mop-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
      - name: Sync VERSION to main
        run: |
          echo "${GITHUB_REF_NAME}" > VERSION
          if ! git diff --quiet VERSION; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION
            git commit -m "chore: sync VERSION to ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi
